<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DX personal logo</title>
  <desc id="desc">A soft Apple-inspired DX monogram with a more expressive italic letterform.</desc>
  <defs>
    <linearGradient id="card" x1="88" y1="64" x2="424" y2="448" gradientUnits="userSpaceOnUse">
